name: Update daily commits
on:
  schedule:
    - cron: "0 0 * * *" # 毎日 00:00 UTC（日本時間09:00）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate daily commits section
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // 直近14日
            const days = 14;
            const today = new Date();
            const dates = [];
            for (let i = days - 1; i >= 0; i--) {
              const d = new Date(today);
              d.setUTCDate(d.getUTCDate() - i);
              const iso = d.toISOString().slice(0, 10);
              dates.push(iso);
            }

            // GitHub REST: Search commits はレート/制約があるので
            // GraphQLの contributionsCollection を使う
            const query = `
              query($login:String!, $from:DateTime!, $to:DateTime!) {
                user(login:$login) {
                  contributionsCollection(from:$from, to:$to) {
                    contributionCalendar {
                      weeks {
                        contributionDays {
                          date
                          contributionCount
                        }
                      }
                    }
                  }
                }
              }
            `;

            const from = new Date(Date.UTC(today.getUTCFullYear(), today.getUTCMonth(), today.getUTCDate() - (days - 1), 0,0,0)).toISOString();
            const to   = new Date(Date.UTC(today.getUTCFullYear(), today.getUTCMonth(), today.getUTCDate() + 1, 0,0,0)).toISOString();

            const result = await github.graphql(query, {
              login: owner,
              from,
              to
            });

            const weeks = result.user.contributionsCollection.contributionCalendar.weeks;
            const map = new Map();
            for (const w of weeks) {
              for (const d of w.contributionDays) {
                map.set(d.date, d.contributionCount);
              }
            }

            const lines = dates.map(date => {
              const n = map.get(date) ?? 0;
              return `- ${date}: **${n}** commits`;
            });

            const start = "<!--START_SECTION:daily_commits-->";
            const end = "<!--END_SECTION:daily_commits-->";

            const fs = require("fs");
            const readmePath = "README.md";
            const readme = fs.readFileSync(readmePath, "utf8");

            const section = `${start}\n${lines.join("\n")}\n${end}`;
            const updated = readme.replace(new RegExp(`${start}[\\s\\S]*?${end}`), section);

            fs.writeFileSync(readmePath, updated, "utf8");

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update daily commits" || exit 0
          git push