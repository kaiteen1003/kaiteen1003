name: Update local GitHub stats SVG

on:
  schedule:
    - cron: "20 0 * * *" # daily 00:20 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SVGs (stats + top langs)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const owner = context.repo.owner;

            // --- GraphQL: basic stats ---
            const q = `
              query($login:String!) {
                user(login:$login) {
                  repositories(privacy: PUBLIC, first: 100, ownerAffiliations: OWNER) {
                    totalCount
                  }
                  followers { totalCount }
                  starredRepositories { totalCount }
                  contributionsCollection {
                    totalCommitContributions
                    totalPullRequestContributions
                    totalIssueContributions
                  }
                  repositoriesContributedTo(first: 1, contributionTypes: [COMMIT, PULL_REQUEST, ISSUE]) {
                    totalCount
                  }
                }
              }
            `;

            const r = await github.graphql(q, { login: owner });
            const u = r.user;

            const stats = {
              repos: u.repositories.totalCount,
              stars: u.starredRepositories.totalCount,
              followers: u.followers.totalCount,
              commits: u.contributionsCollection.totalCommitContributions,
              prs: u.contributionsCollection.totalPullRequestContributions,
              issues: u.contributionsCollection.totalIssueContributions,
              contributedTo: u.repositoriesContributedTo.totalCount,
            };

            // --- GraphQL: top languages by bytes (public repos only) ---
            const qLang = `
              query($login:String!, $n:Int!) {
                user(login:$login) {
                  repositories(first: $n, privacy: PUBLIC, ownerAffiliations: OWNER, orderBy: {field: UPDATED_AT, direction: DESC}) {
                    nodes {
                      languages(first: 10, orderBy: {field: SIZE, direction: DESC}) {
                        edges { size node { name } }
                      }
                    }
                  }
                }
              }
            `;

            const repoCount = 80;
            const lr = await github.graphql(qLang, { login: owner, n: repoCount });

            const langMap = new Map();
            for (const repo of lr.user.repositories.nodes) {
              for (const e of repo.languages.edges) {
                const name = e.node.name;
                langMap.set(name, (langMap.get(name) || 0) + e.size);
              }
            }
            const langs = [...langMap.entries()]
              .sort((a,b) => b[1]-a[1])
              .slice(0, 8);

            const maxLang = Math.max(...langs.map(x => x[1]), 1);

            // --- Simple SVG templates (dark-ish like your vue/tokyonight vibe) ---
            function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

            function svgCard({title, width=460, height=180, body}) {
              return `
              <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
                <defs>
                  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0" stop-color="#0b1220"/>
                    <stop offset="1" stop-color="#111827"/>
                  </linearGradient>
                </defs>
                <rect x="0" y="0" width="${width}" height="${height}" rx="18" fill="url(#bg)"/>
                <text x="24" y="34" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto" font-size="16" font-weight="700" fill="#E5E7EB">${esc(title)}</text>
                ${body}
              </svg>
              `.trim();
            }

            const statLines = [
              ["Total Commits", stats.commits],
              ["Pull Requests", stats.prs],
              ["Issues", stats.issues],
              ["Stars", stats.stars],
              ["Followers", stats.followers],
              ["Public Repos", stats.repos],
            ];

            let bodyStats = "";
            let y = 62;
            for (const [k,v] of statLines) {
              bodyStats += `
                <text x="24" y="${y}" font-family="ui-sans-serif,system-ui" font-size="13" fill="#94A3B8">${esc(k)}</text>
                <text x="436" y="${y}" text-anchor="end" font-family="ui-sans-serif,system-ui" font-size="13" font-weight="700" fill="#E5E7EB">${v}</text>
              `;
              y += 22;
            }

            const statsSvg = svgCard({ title: "GitHub Stats", body: bodyStats });

            // Top langs bars
            let bodyLang = "";
            let ly = 60;
            for (const [name, size] of langs) {
              const w = Math.round((size / maxLang) * 280);
              bodyLang += `
                <text x="24" y="${ly}" font-family="ui-sans-serif,system-ui" font-size="12" fill="#E5E7EB">${esc(name)}</text>
                <rect x="170" y="${ly-10}" width="280" height="10" rx="5" fill="#1F2937"/>
                <rect x="170" y="${ly-10}" width="${w}" height="10" rx="5" fill="#22C55E"/>
              `;
              ly += 18;
            }
            const langSvg = svgCard({ title: "Top Languages (public repos)", body: bodyLang });

            const outDir = path.join(process.cwd(), "assets");
            if (!fs.existsSync(outDir)) fs.mkdirSync(outDir);

            fs.writeFileSync(path.join(outDir, "github-stats.svg"), statsSvg + "\n", "utf8");
            fs.writeFileSync(path.join(outDir, "top-langs.svg"), langSvg + "\n", "utf8");

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg assets/top-langs.svg
          git commit -m "chore: update local stats svgs" || exit 0
          git push